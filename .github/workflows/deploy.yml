name: Deploy .NET App to Azure

on:
  push:
    branches:
      - master   # or master (check your branch)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Build Project
        run: dotnet publish ./TinyApiUrl.csproj -c Release -o out

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: tiny-url-demo   # your Azure app name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./out
